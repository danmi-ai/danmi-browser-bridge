# Publish the static landing site (web/) to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
# After that, every push to web/ redeploys https://danmi-ai.github.io/danmi-browser-bridge/
name: pages

on:
  push:
    branches: ["master"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages via the API (uses the workflow's pages:write token) so
          # no manual Settings → Pages toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
