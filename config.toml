[server]
host = "0.0.0.0"
port = 8403
version = "0.8.5"

[server.timeouts]
ws_heartbeat_interval = 15
ws_heartbeat_timeout = 5
command_default = 30
command_navigate = 30
command_snapshot = 10
command_screenshot = 5
command_click = 10
command_fill = 10

[session]
idle_timeout = 300
max_lifetime = 7200
max_per_device = 3

[database]
path = "data/browser_bridge.db"

[pairing]
code_length = 6
code_expiry = 1800

[extension]
current_version = "0.8.5"
min_version = "0.8.5"
# Path to the published zip (relative to this config file's parent, or absolute).
# Used by /api/v1/extension/latest to compute sha256 at startup.
zip_path = "web/danmi-browser-bridge-extension.zip"

[server.limits]
# v0.6.0 CDP relay：Playwright 一次握手会瞬时发 10+ CDP 命令；
# 限额按 v0.5.0 业务命令尺度（5/100/1000）会秒爆。按 CDP 频率重设：
per_session_window_seconds = 60
per_session_max = 2000
# concurrent commands per device
per_device_concurrent_max = 100
# 24h sliding window per user
per_user_window_seconds = 86400
per_user_max = 50000
